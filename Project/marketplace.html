<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bin2Business — Live Marketplace</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root {
      --bg:        #080d0a;
      --surface:   #0f1a12;
      --card:      #111c14;
      --border:    rgba(0,255,102,0.12);
      --primary:   #00ff66;
      --primary-dim:#00c44d;
      --muted:     #4a6155;
      --text:      #e8f0ea;
      --text-soft: #7a9882;
      --danger:    #ff6b6b;
      --gold:      #f5c842;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── grid noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,255,102,0.07) 0%, transparent 70%);
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 64px;
      background: rgba(8,13,10,0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      gap: 16px;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px;
      text-decoration: none; color: var(--text);
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .nav-logo span { color: var(--primary); }
    .nav-logo-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(0,255,102,0.1); border: 1px solid rgba(0,255,102,0.25);
      display: flex; align-items: center; justify-content: center;
    }

    .nav-links { display: flex; align-items: center; gap: 2px; }

    .nav-link {
      position: relative;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 9px;
      font-size: 13px; font-weight: 500;
      text-decoration: none; color: var(--text-soft);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-link svg { flex-shrink: 0; }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }

    /* Dashboard pill — filled background */
    .nav-link.pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
    }
    .nav-link.pill:hover { background: rgba(255,255,255,0.13); }

    /* Active page — green text + underline */
    .nav-link.active {
      color: var(--primary);
    }
    .nav-link.active::after {
      content: '';
      position: absolute; bottom: 0; left: 8px; right: 8px;
      height: 2px; border-radius: 2px;
      background: var(--primary);
    }

    /* Theme toggle */
    .nav-theme-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent; cursor: pointer;
      font-size: 13px; font-weight: 500;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .nav-theme-btn:hover { background: rgba(255,255,255,0.07); }
    .theme-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f5a623; flex-shrink: 0;
    }

    /* Light mode nav overrides */
    body.light nav { background: rgba(244,247,245,0.92); border-bottom-color: rgba(0,160,60,0.15); }
    body.light .nav-link.pill { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: var(--text); }
    body.light .nav-theme-btn { border-color: rgba(0,0,0,0.18); color: var(--text); }
    body.light .nav-theme-btn:hover { background: rgba(0,0,0,0.05); }

    /* ── LIGHT THEME FULL OVERRIDES ── */
    body.light {
      --bg:          #f4f7f5;
      --surface:     #eaf0ec;
      --card:        #ffffff;
      --border:      rgba(0,140,60,0.18);
      --primary:     #00a83c;
      --primary-dim: #007a2b;
      --muted:       #a0b8a8;
      --text:        #0d1f13;
      --text-soft:   #4a7558;
      --danger:      #e03030;
      --gold:        #c8980a;
      background: var(--bg);
      color: var(--text);
    }

    /* Background radial gradient */
    body.light::before {
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,180,80,0.07) 0%, transparent 70%);
    }

    /* Page title gradient for light */
    body.light .page-title {
      background: linear-gradient(135deg, #0d1f13 30%, #00a83c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Map section label badge */
    body.light .map-section::before {
      background: rgba(244,247,245,0.92);
      border-color: rgba(0,140,60,0.25);
      color: var(--primary);
    }

    /* Map */
    body.light #map { background: #e8f0ea; }
    body.light .leaflet-container { background: #e8f0ea !important; }
    body.light .leaflet-tile { filter: none; }
    body.light .leaflet-control-zoom a {
      background: #fff !important;
      color: #0d1f13 !important;
      border-color: rgba(0,140,60,0.25) !important;
    }
    body.light .leaflet-control-zoom a:hover { background: #f0f5f1 !important; }
    body.light .leaflet-control-attribution {
      background: rgba(244,247,245,0.9) !important;
      color: #4a7558 !important;
    }
    body.light .leaflet-control-attribution a { color: #00a83c !important; }

    /* Marker tooltips */
    body.light .marker-tooltip {
      background: #fff !important;
      border-color: rgba(0,140,60,0.22) !important;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,140,60,0.1) !important;
    }
    body.light .marker-tooltip .tt-name { color: #0d1f13; }
    body.light .marker-tooltip .tt-price { color: #4a7558; }

    /* Cards */
    body.light .listing-card {
      background: #fff;
      border-color: rgba(0,140,60,0.15);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    body.light .listing-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,140,60,0.25);
      border-color: rgba(0,140,60,0.3);
    }
    body.light .listing-card::before {
      background: radial-gradient(ellipse at top right, rgba(0,180,80,0.05) 0%, transparent 60%);
    }
    body.light .seller-badge {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.08);
    }
    body.light .seller-avatar { color: #fff; }
    body.light .buy-btn { color: #fff; }
    body.light .buy-btn:hover {
      background: #009934;
      box-shadow: 0 4px 20px rgba(0,168,60,0.35);
    }
    body.light .buy-btn.sold {
      background: #eaf0ec;
      color: #a0b8a8;
      border-color: rgba(0,140,60,0.15);
    }

    /* Filter banner */
    body.light #filter-banner {
      background: rgba(0,168,60,0.07);
      border-color: rgba(0,168,60,0.3);
    }
    body.light .filter-clear:hover { background: rgba(0,0,0,0.05); color: var(--text); }

    /* Sort buttons */
    body.light .sort-btn { color: var(--text-soft); }
    body.light .sort-btn:hover, body.light .sort-btn.active {
      background: rgba(0,168,60,0.09);
      color: var(--primary);
      border-color: rgba(0,168,60,0.3);
    }

    /* Nav links in light */
    body.light .nav-link { color: #4a7558; }
    body.light .nav-link:hover { background: rgba(0,0,0,0.05); color: #0d1f13; }
    body.light .nav-link.active { color: var(--primary); }
    body.light .nav-logo { color: #0d1f13; }
    body.light .nav-logo-icon {
      background: rgba(0,168,60,0.1);
      border-color: rgba(0,168,60,0.25);
    }

    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,102,0.6); }
      50%      { opacity:0.7; box-shadow: 0 0 0 5px rgba(0,255,102,0); }
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 80px 24px 60px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .page-title {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -1.5px; line-height: 1;
      background: linear-gradient(135deg, #e8f0ea 30%, #00ff66);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-subtitle { color: var(--text-soft); font-size: 14px; margin-top: 6px; }

    .header-stats { display: flex; gap: 12px; align-items: center; }
    .stat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 12px; font-weight: 600;
      color: var(--text-soft); white-space: nowrap;
    }
    .stat-pill strong { color: var(--primary); }

    /* ── MAP SECTION ── */
    .map-section {
      border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(0,255,102,0.05), 0 24px 60px rgba(0,0,0,0.5);
      margin-bottom: 40px; position: relative;
    }
    .map-section::before {
      content: 'LIVE MAP';
      position: absolute; top: 14px; left: 14px; z-index: 1000;
      font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 2px; color: var(--primary);
      background: rgba(8,13,10,0.85); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px;
    }

    #map {
      height: 380px; width: 100%;
      background: #0a130c;
    }

    /* ── CUSTOM LEAFLET MARKER TOOLTIP ── */
    .marker-tooltip {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      padding: 10px 14px !important;
      font-family: 'DM Sans', sans-serif !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,102,0.15) !important;
      white-space: nowrap !important;
      pointer-events: none !important;
    }
    .marker-tooltip::before { display: none !important; }
    .marker-tooltip .tt-name {
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
      color: var(--text); display: block; margin-bottom: 3px;
    }
    .marker-tooltip .tt-item {
      font-size: 12px; color: var(--primary); font-weight: 600; display: block;
    }
    .marker-tooltip .tt-price {
      font-size: 11px; color: var(--text-soft); display: block; margin-top: 2px;
    }
    .marker-tooltip .tt-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; margin-top: 5px; color: var(--text-soft);
    }
    .marker-tooltip .tt-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--primary);
    }

    /* Override Leaflet styles for dark map */
    .leaflet-container { background: #0a130c !important; }
    .leaflet-tile { filter: brightness(0.5) saturate(0.4) hue-rotate(90deg); }
    .leaflet-control-zoom a {
      background: var(--card) !important; color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface) !important; }
    .leaflet-control-attribution {
      background: rgba(8,13,10,0.8) !important; color: var(--muted) !important;
    }
    .leaflet-control-attribution a { color: var(--text-soft) !important; }

    /* ── FILTER BANNER ── */
    #filter-banner {
      display: none;
      align-items: center; justify-content: space-between;
      padding: 10px 18px; border-radius: 12px; margin-bottom: 20px;
      background: rgba(0,255,102,0.07);
      border: 1px solid rgba(0,255,102,0.3);
      font-size: 13px; gap: 12px;
    }
    #filter-banner.visible { display: flex; }
    .filter-left { display: flex; align-items: center; gap: 10px; }
    .filter-tag {
      background: rgba(0,255,102,0.15); color: var(--primary);
      border-radius: 6px; padding: 3px 10px; font-weight: 700; font-size: 12px;
    }
    .filter-count { color: var(--text-soft); font-size: 12px; }
    .filter-clear {
      padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-soft); font-size: 12px;
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .filter-clear:hover { background: rgba(255,255,255,0.06); color: var(--text); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 20px;
      letter-spacing: -0.5px;
    }
    .section-sort {
      display: flex; gap: 6px;
    }
    .sort-btn {
      padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-soft); cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .sort-btn:hover, .sort-btn.active {
      background: rgba(0,255,102,0.08);
      color: var(--primary); border-color: rgba(0,255,102,0.3);
    }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .listing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      display: flex; flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, opacity 0.3s;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .listing-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top right, rgba(0,255,102,0.04) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .listing-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,255,102,0.2);
      border-color: rgba(0,255,102,0.3);
    }
    .listing-card:hover::before { opacity: 1; }
    .listing-card.highlighted {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary), 0 12px 40px rgba(0,255,102,0.15);
    }
    .listing-card.dimmed { opacity: 0.32; filter: grayscale(40%); }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }
    .seller-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; color: var(--text-soft); font-weight: 500;
    }
    .seller-avatar {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--primary); display: flex; align-items: center;
      justify-content: center; font-size: 9px; font-weight: 700; color: #080d0a;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 2px;
    }
    .status-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
    .status-dot.sold   { background: var(--muted); }

    .card-material {
      font-family: 'Outfit', sans-serif; font-weight: 700;
      font-size: 22px; letter-spacing: -0.5px; color: var(--text);
      margin-bottom: 4px;
    }
    .card-category {
      font-size: 11px; color: var(--text-soft); font-weight: 500;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    }

    .card-stats {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; flex: 1;
    }
    .stat-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-soft);
    }
    .stat-row svg { color: var(--primary); flex-shrink: 0; }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .card-value { }
    .card-value-label { font-size: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value-amount {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 24px;
      color: var(--primary); letter-spacing: -1px;
    }

    .buy-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 10px;
      background: var(--primary); color: #080d0a;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .buy-btn:hover {
      background: #00e85c;
      box-shadow: 0 4px 20px rgba(0,255,102,0.4);
      transform: scale(1.03);
    }
    .buy-btn:active { transform: scale(0.97); }
    .buy-btn.sold {
      background: var(--surface); color: var(--muted);
      border: 1px solid var(--border); pointer-events: none;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: var(--text-soft);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-family: 'Outfit', sans-serif; font-size: 18px; margin-bottom: 6px; color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .header-stats { flex-wrap: wrap; }
      .section-sort { display: none; }
      #map { height: 280px; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <!-- Logo -->
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#00ff66" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        <path d="m13.378 9.633 4.096 1.098 1.097-4.096"/>
      </svg>
    </div>
    Bin2<span>Business</span>
  </a>

  <!-- Nav links with icons -->
  <div class="nav-links">
    <a href="index.html" class="nav-link pill">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/>

      </svg>
      Dashboard
    </a>
    <a href="sell.html" class="nav-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      Sell Waste
    </a>
    <a href="marketplace.html" class="nav-link active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/>
        <path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244"/>
        <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05"/>
      </svg>
      Marketplace
    </a>
    <a href="leaderboard.html" class="nav-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978"/>
        <path d="M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978"/>
        <path d="M18 9h1.5a1 1 0 0 0 0-5H18"/><path d="M4 22h16"/>
        <path d="M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z"/>
        <path d="M6 9H4.5a1 1 0 0 1 0-5H6"/>
      </svg>
      Leaderboard
    </a>
  </div>

  <!-- Theme toggle -->
  <button class="nav-theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
    <span class="theme-dot" id="theme-dot"></span>
    <span id="theme-label">Light</span>
  </button>
</nav>

<main>
  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Live Marketplace</h1>
      <p class="page-subtitle">Buy verified recyclable materials from Jamaican collectors.</p>
    </div>
    <div class="header-stats">
      <div class="stat-pill">Total listings <strong id="total-count">8</strong></div>
      <div class="stat-pill">Est. value <strong id="total-value">J$0</strong></div>
    </div>
  </div>

  <!-- ── MAP ── -->
  <div class="map-section">
    <div id="map"></div>
  </div>

  <!-- ── FILTER BANNER ── -->
  <div id="filter-banner">
    <div class="filter-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span style="font-size:13px;color:var(--text-soft)">Buyers for</span>
      <span class="filter-tag" id="filter-label"></span>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <button class="filter-clear" onclick="clearFilter()">Show All</button>
  </div>

  <!-- ── LISTINGS ── -->
  <div class="section-header">
    <h2 class="section-title">Recent Listings</h2>
    <div class="section-sort">
      <button class="sort-btn active" onclick="sortCards('newest', this)">Newest</button>
      <button class="sort-btn" onclick="sortCards('price-high', this)">Price ↑</button>
      <button class="sort-btn" onclick="sortCards('weight', this)">Weight</button>
    </div>
  </div>

  <div class="cards-grid" id="cards-grid"></div>
</main>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const LISTINGS = [
  { id: 1, seller: 'Marcus W.',  initials: 'MW', material: 'Plastic Bottles', category: 'Plastic',     kg: 2.50, pricePerKg: 40,  value: 100, lat: 18.0179, lng: -76.8099, area: 'Kingston',       active: true  },
  { id: 2, seller: 'Simone R.',  initials: 'SR', material: 'Glass Bottles',   category: 'Glass',       kg: 3.20, pricePerKg: 10,  value: 128, lat: 18.4762, lng: -77.8939, area: 'Montego Bay',    active: true  },
  { id: 3, seller: 'Andre B.',   initials: 'AB', material: 'Mixed Metals',    category: 'Metal',       kg: 4.50, pricePerKg: 80,  value: 360, lat: 18.2011, lng: -77.3975, area: 'Mandeville',     active: true  },
  { id: 4, seller: 'Kezia M.',   initials: 'KM', material: 'Aluminium Cans',  category: 'Metal',       kg: 1.80, pricePerKg: 120, value: 216, lat: 18.1096, lng: -77.2975, area: 'Spanish Town',   active: true  },
  { id: 5, seller: 'Tristan L.', initials: 'TL', material: 'Cardboard',       category: 'Paper',       kg: 6.00, pricePerKg: 15,  value: 90,  lat: 18.0050, lng: -76.7410, area: 'Portmore',       active: true  },
  { id: 6, seller: 'Nadine F.',  initials: 'NF', material: 'E-Waste',         category: 'Electronics', kg: 0.90, pricePerKg: 200, value: 180, lat: 18.0300, lng: -76.8500, area: 'Half Way Tree',  active: true  },
  { id: 7, seller: 'Devon C.',   initials: 'DC', material: 'Scrap Iron',      category: 'Metal',       kg: 8.00, pricePerKg: 80,  value: 640, lat: 17.9970, lng: -76.7800, area: 'May Pen',        active: false },
  { id: 8, seller: 'Yanique H.', initials: 'YH', material: 'Plastic Bags',   category: 'Plastic',     kg: 1.20, pricePerKg: 20,  value: 24,  lat: 18.4500, lng: -77.9200, area: 'St. James',      active: true  },
];

// ── STATE ───────────────────────────────────────────────────────────────────
let activeFilter  = null;
let markerMap     = {};   // id → Leaflet marker
let currentSort   = 'newest';

// ── MAP ─────────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [18.18, -77.40],
  zoom: 10,
  zoomControl: true,
  scrollWheelZoom: false,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// Build custom divIcon
function makeIcon(listing) {
  const color   = listing.active ? '#00ff66' : '#475569';
  const glow    = listing.active ? `box-shadow:0 0 10px ${color},0 0 20px rgba(0,255,102,0.4);` : '';
  return L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};${glow}border:2px solid rgba(8,13,10,0.9);transition:transform 0.15s;"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// Tooltip HTML
function tooltipHTML(l) {
  return `
    <div class="marker-tooltip">
      <span class="tt-name">${l.seller}</span>
      <span class="tt-item">${l.material}</span>
      <span class="tt-price">${l.kg} kg · J$${l.pricePerKg}/kg · ${l.area}</span>
      <span class="tt-status">
        <span class="tt-dot" style="background:${l.active ? 'var(--primary)' : '#475569'}"></span>
        ${l.active ? 'Available now' : 'Sold'}
      </span>
    </div>`;
}

LISTINGS.forEach(l => {
  const marker = L.marker([l.lat, l.lng], { icon: makeIcon(l) })
    .addTo(map)
    .bindTooltip(tooltipHTML(l), {
      permanent: false,
      direction: 'top',
      offset: [0, -10],
      opacity: 1,
      className: '',   // we style via .marker-tooltip class in CSS
    });

  // Hover: enlarge marker + highlight card only (no scroll)
  marker.on('mouseover', () => {
    marker.getElement().querySelector('div').style.transform = 'scale(1.7)';
    const card = document.getElementById('card-' + l.id);
    if (card) card.classList.add('highlighted');
  });
  marker.on('mouseout', () => {
    marker.getElement().querySelector('div').style.transform = 'scale(1)';
    const card = document.getElementById('card-' + l.id);
    if (card) card.classList.remove('highlighted');
  });
  // Click tooltip → scroll to the listing card
  marker.on('click', () => {
    const card = document.getElementById('card-' + l.id);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  markerMap[l.id] = marker;
});

// ── CARDS ───────────────────────────────────────────────────────────────────
function renderCards(listings) {
  const grid = document.getElementById('cards-grid');
  if (!listings.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">♻️</div><h3>No listings match this category</h3><p>Try a different filter or check back soon.</p></div>`;
    return;
  }
  grid.innerHTML = listings.map(l => `
    <div class="listing-card ${activeFilter && l.category !== activeFilter ? 'dimmed' : ''}"
         id="card-${l.id}"
         onmouseenter="onCardHover(${l.id})"
         onmouseleave="onCardLeave(${l.id})">
      <div class="card-top">
        <div class="seller-badge">
          <div class="seller-avatar">${l.initials}</div>
          ${l.seller}
        </div>
        <div class="status-dot ${l.active ? 'active' : 'sold'}"></div>
      </div>
      <div class="card-material">${l.material}</div>
      <div class="card-category">${l.category} · ${l.area}</div>
      <div class="card-stats">
        <div class="stat-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/></svg>
          <span>${l.kg.toFixed(2)} kg available</span>
        </div>
        <div class="stat-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
          <span>J$${l.pricePerKg.toLocaleString()}/kg</span>
        </div>
        <div class="stat-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${l.lat.toFixed(4)}, ${l.lng.toFixed(4)}</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="card-value">
          <div class="card-value-label">Total Value</div>
          <div class="card-value-amount">J$${l.value.toLocaleString()}</div>
        </div>
        <button class="buy-btn ${l.active ? '' : 'sold'}" onclick="handleBuy(${l.id})">
          ${l.active
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Buy Now`
            : 'Sold'}
        </button>
      </div>
    </div>
  `).join('');
}

// ── CARD ↔ MAP HOVER ────────────────────────────────────────────────────────
function onCardHover(id) {
  const listing = LISTINGS.find(l => l.id === id);
  const marker  = markerMap[id];
  if (!listing || !marker) return;
  marker.getElement().querySelector('div').style.transform = 'scale(1.8)';
  marker.openTooltip();
  map.setView([listing.lat, listing.lng], Math.max(map.getZoom(), 9), { animate: true, duration: 0.4 });
}

function onCardLeave(id) {
  const marker = markerMap[id];
  if (!marker) return;
  marker.getElement().querySelector('div').style.transform = 'scale(1)';
  marker.closeTooltip();
}

// ── BUY ─────────────────────────────────────────────────────────────────────
function handleBuy(id) {
  const listing = LISTINGS.find(l => l.id === id);
  if (!listing || !listing.active) return;
  alert(`📦 Contact ${listing.seller} for ${listing.material} (${listing.kg} kg)\n\nThis would open a WhatsApp or contact flow in production.`);
}

// ── SORT ────────────────────────────────────────────────────────────────────
function sortCards(mode, btn) {
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let sorted = [...LISTINGS];
  if (mode === 'price-high') sorted.sort((a,b) => b.value - a.value);
  else if (mode === 'weight') sorted.sort((a,b) => b.kg - a.kg);
  renderCards(sorted);
  updateFilterStyles();
}

// ── FILTER ───────────────────────────────────────────────────────────────────
const CAT_KEYWORDS = {
  Plastic:     ['plastic'],
  Metal:       ['metal','aluminium','aluminum','iron','steel','copper','scrap'],
  Glass:       ['glass'],
  Paper:       ['paper','cardboard'],
  Electronics: ['electronic','e-waste','battery','circuit'],
  Organic:     ['organic','compost','wood'],
};

function applyFilter(category) {
  activeFilter = category;
  const keywords = CAT_KEYWORDS[category] || [category.toLowerCase()];
  const matches  = LISTINGS.filter(l =>
    keywords.some(kw => l.material.toLowerCase().includes(kw) || l.category.toLowerCase().includes(kw))
  );

  // Render (all cards, dimming handled per card)
  renderCards(LISTINGS);
  updateFilterStyles();

  // Banner
  const banner = document.getElementById('filter-banner');
  document.getElementById('filter-label').textContent = category;
  document.getElementById('filter-count').textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;
  banner.classList.add('visible');

  // Scroll to first match
  if (matches.length) {
    setTimeout(() => {
      const el = document.getElementById('card-' + matches[0].id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
  }

  // Fade unmatched markers on map
  LISTINGS.forEach(l => {
    const m = markerMap[l.id];
    if (!m) return;
    const isMatch = keywords.some(kw => l.material.toLowerCase().includes(kw) || l.category.toLowerCase().includes(kw));
    m.getElement().style.opacity = isMatch ? '1' : '0.25';
  });
}

function updateFilterStyles() {
  document.querySelectorAll('.listing-card').forEach(card => {
    const id = parseInt(card.id.replace('card-', ''));
    const l  = LISTINGS.find(x => x.id === id);
    if (!activeFilter) { card.classList.remove('dimmed'); return; }
    const kws = CAT_KEYWORDS[activeFilter] || [activeFilter.toLowerCase()];
    const match = kws.some(kw => l.material.toLowerCase().includes(kw) || l.category.toLowerCase().includes(kw));
    card.classList.toggle('dimmed', !match);
  });
}

function clearFilter() {
  activeFilter = null;
  document.getElementById('filter-banner').classList.remove('visible');
  renderCards(LISTINGS);
  LISTINGS.forEach(l => {
    const m = markerMap[l.id];
    if (m) m.getElement().style.opacity = '1';
  });
  try { history.replaceState(null, '', window.location.pathname); } catch(e) {}
}
window.clearFilter = clearFilter;

// ── HEADER STATS ─────────────────────────────────────────────────────────────
function updateStats() {
  const activeListings = LISTINGS.filter(l => l.active);
  const total = activeListings.reduce((s, l) => s + l.value, 0);
  document.getElementById('total-count').textContent = LISTINGS.length;
  document.getElementById('total-value').textContent = 'J$' + total.toLocaleString();
}

// ── THEME TOGGLE ──────────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('b2b-theme', isLight ? 'light' : 'dark');
  const dot   = document.getElementById('theme-dot');
  const label = document.getElementById('theme-label');
  if (dot)   dot.style.background   = isLight ? '#4a9f6a' : '#f5a623';
  if (label) label.textContent      = isLight ? 'Dark'   : 'Light';
}

// Restore saved theme on load
(function() {
  if (localStorage.getItem('b2b-theme') === 'light') {
    document.body.classList.add('light');
    const dot   = document.getElementById('theme-dot');
    const label = document.getElementById('theme-label');
    if (dot)   dot.style.background = '#4a9f6a';
    if (label) label.textContent    = 'Dark';
  }
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCards(LISTINGS);
updateStats();

// Check URL param from sell.html
(function() {
  try {
    const cat = new URLSearchParams(window.location.search).get('category');
    if (cat) setTimeout(() => applyFilter(cat), 300);
  } catch(e) {}
})();
</script>
</body>
</html>
