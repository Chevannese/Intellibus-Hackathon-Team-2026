<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BinToBusiness</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&callback=initMap">
</script>

</head>

<body>

<header>
<h1>BinToBusiness</h1>
</header>

<!-- LANDING PAGE -->
<section id="landing" class="active">
<img src="bottle.png" class="hero-img">
<button onclick="startApp()">Start Recycling</button>
</section>

<!-- UPLOAD PAGE -->
<section id="upload">

<h2>Upload Your Recyclable Item</h2>

<div class="buttons">
<input type="file" id="fileInput" accept="image/*">

<button onclick="startCamera()">Camera</button>
</div>

<video id="camera" autoplay style="display:none;"></video>

<button id="captureBtn" onclick="captureImage()" style="display:none;">
Capture
</button>

<canvas id="canvas" style="display:none;"></canvas>

<div class="buttons">
<button onclick="confirmImage()">Confirm</button>
</div>

<p id="error"></p>

</section>

<!-- LOADING -->
<section id="loading">
<div class="loader"></div>
<p>Analyzing recyclable item...</p>
</section>

<!-- RESULTS -->
<section id="results">

<div class="top">

<div class="image-preview">
<img id="previewImage">
</div>

<div id="map"></div>

</div>

<div class="controls">

<select id="sort" onchange="sortCompanies()">
<option value="name">Sort by Name</option>
<option value="price">Sort by Price</option>
<option value="distance">Sort by Proximity</option>
</select>

</div>

<div id="companyList"></div>

</section>

</body>
</html>
