<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamaica · recycling parishes (hover)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #eaf7e1 0%, #d4e9cc 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .map-card {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 40, 0, 0.3);
            padding: 28px 28px 32px 28px;
            border: 2px solid #2b5e2b;
        }
        h1 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 2.4rem;
            color: #1e3a1e;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 12px;
        }
        h1 span {
            font-size: 1.2rem;
            background: #2b5e2b;
            color: #f5ffe1;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-weight: 400;
        }
        .sub {
            color: #1f4f1f;
            font-weight: 500;
            font-size: 1.2rem;
            margin: 0 0 24px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub i {
            font-style: normal;
            background: #386b38;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .main-panel {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }
        .svg-container {
            flex: 2 1 600px;
            background: #cfe2cf;
            border-radius: 40px;
            padding: 24px 18px 18px 18px;
            box-shadow: inset 0 0 0 2px #eaffea, 0 10px 15px -5px #1f3f1f;
        }
        svg {
            display: block;
            width: 100%;
            height: auto;
            filter: drop-shadow(6px 8px 6px #22442280);
        }
        /* parish base style */
        .parish {
            transition: all 0.15s ease;
            cursor: default;
            stroke: #fcf9e1;
            stroke-width: 1.5;
            vector-effect: non-scaling-stroke;
        }
        .parish:hover {
            stroke-width: 3;
            stroke: #f9f3b0;
            filter: drop-shadow(0 0 12px #c6ff9e);
        }
        /* live hover indicator */
        .info-side {
            flex: 1 1 280px;
            background: #f2fbe8;
            border-radius: 40px;
            padding: 28px 20px;
            box-shadow: inset 0 2px 12px #ccf0cc, 0 10px 20px #1d3b1d;
            border: 2px solid #477a47;
            display: flex;
            flex-direction: column;
        }
        .side-header {
            font-size: 1.9rem;
            font-weight: 600;
            color: #163016;
            line-height: 1.2;
            border-bottom: 5px dotted #8bb48b;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .side-header::before {
            content: "♻️";
            font-size: 2.2rem;
        }
        #current-parish-name {
            background: #306530;
            color: white;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid #c0ffb0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .recycling-list {
            background: #def0d6;
            border-radius: 32px;
            padding: 22px 18px;
            flex: 1;
            box-shadow: inset 0 4px 6px #b1d4a1, 0 6px 0 #2b5a2b;
            border: 1px solid #306530;
            overflow-y: auto;
            max-height: 400px;
        }
        .recycling-list h3 {
            margin: 0 0 12px 0;
            font-weight: 500;
            color: #0a2f0a;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recycling-list ul {
            margin: 0;
            padding-left: 8px;
            list-style: none;
        }
        .recycling-list li {
            background: white;
            margin: 12px 0;
            padding: 14px 16px;
            border-radius: 50px;
            border-left: 12px solid #1e7e1e;
            box-shadow: 0 4px 0 #256825;
            font-weight: 500;
            color: #003000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
            font-size: 1rem;
        }
        .recycling-list li span {
            background: #e0f0d0;
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 0.8rem;
            font-weight: 400;
            color: #1e4a1e;
            margin-left: auto;
        }
        .empty-message {
            background: #f3ffe0;
            border-radius: 40px;
            padding: 26px 18px;
            text-align: center;
            color: #345e34;
            font-size: 1.3rem;
            border: 3px dashed #8bc34a;
        }
        .footer-note {
            margin-top: 25px;
            color: #1f4f1f;
            font-size: 0.95rem;
            text-align: center;
            background: #c0dfc0;
            padding: 10px 16px;
            border-radius: 60px;
            width: fit-content;
            align-self: center;
        }
    </style>
</head>
<body>
<div class="map-card">
    <h1>🇯🇲 JAMAICA <span>recycling locator</span></h1>
    <div class="sub"><i>hover any parish</i> → show recycling centres</div>

    <div class="main-panel">
        <!-- SVG map container -->
        <div class="svg-container">
            <svg viewBox="0 0 660 380" xmlns="http://www.w3.org/2000/svg" version="1.1">
                <!-- styles for text and background (subtle) -->
                <rect width="660" height="380" fill="#b8d9b0" rx="20" ry="20" />

                <!--  parish boundaries & names – simplified but recognisable polygons  -->
                <!--  each parish has id="parish-*", class="parish", and data-name for hover  -->

                <!-- 1. Hanover -->
                <polygon id="parish-hanover" class="parish" data-name="Hanover" points="80,70 135,60 150,110 120,140 70,130 55,95 80,70" fill="#2f7d4f" stroke="white" stroke-width="1.5" />
                <!-- 2. Westmoreland -->
                <polygon id="parish-westmoreland" class="parish" data-name="Westmoreland" points="58,140 110,148 128,190 95,220 42,205 30,160 58,140" fill="#3d8f5c" />
                <!-- 3. St. Elizabeth -->
                <polygon id="parish-st-elizabeth" class="parish" data-name="St. Elizabeth" points="98,198 160,200 185,248 150,280 90,270 65,225 98,198" fill="#3b8853" />
                <!-- 4. Manchester -->
                <polygon id="parish-manchester" class="parish" data-name="Manchester" points="172,213 225,210 255,255 225,280 176,272 152,235 172,213" fill="#439b5f" />
                <!-- 5. St. Ann -->
                <polygon id="parish-st-ann" class="parish" data-name="St. Ann" points="265,135 325,130 355,170 328,205 270,200 241,165 265,135" fill="#358350" />
                <!-- 6. Trelawny -->
                <polygon id="parish-trelawny" class="parish" data-name="Trelawny" points="182,110 235,100 270,132 225,145 184,135 162,118 182,110" fill="#52a567" />
                <!-- 7. St. James -->
                <polygon id="parish-st-james" class="parish" data-name="St. James" points="120,65 168,58 188,98 151,112 110,98 96,75 120,65" fill="#46945c" />
                <!-- 8. St. Mary -->
                <polygon id="parish-st-mary" class="parish" data-name="St. Mary" points="338,122 390,120 412,155 385,183 345,176 322,146 338,122" fill="#378f4a" />
                <!-- 9. Portland -->
                <polygon id="parish-portland" class="parish" data-name="Portland" points="416,125 472,115 500,145 478,185 432,185 405,156 416,125" fill="#328f4b" />
                <!-- 10. St. Thomas -->
                <polygon id="parish-st-thomas" class="parish" data-name="St. Thomas" points="464,198 525,185 560,210 532,250 478,247 442,220 464,198" fill="#52a067" />
                <!-- 11. St. Andrew -->
                <polygon id="parish-st-andrew" class="parish" data-name="St. Andrew" points="390,188 435,190 460,215 425,235 390,225 372,206 390,188" fill="#479e5f" />
                <!-- 12. Kingston (tiny, but we include as parish) -->
                <polygon id="parish-kingston" class="parish" data-name="Kingston" points="425,222 445,218 448,236 428,240 415,228 425,222" fill="#54ad67" />
                <!-- 13. Clarendon -->
                <polygon id="parish-clarendon" class="parish" data-name="Clarendon" points="225,210 288,205 317,245 283,270 223,265 194,238 225,210" fill="#3f9757" />
                <!-- 14. St. Catherine -->
                <polygon id="parish-st-catherine" class="parish" data-name="St. Catherine" points="313,205 370,200 400,230 365,258 322,256 291,235 313,205" fill="#429359" />

                <!-- labels (optional, for clarity but not necessary for hover) -->
                <text x="70" y="100" font-size="10" fill="#eaf9e0" font-weight="bold" opacity="0.9">Hanover</text>
                <text x="45" y="180" font-size="10" fill="#eaf9e0">Westmoreland</text>
                <text x="95" y="245" font-size="10" fill="#eaf9e0">St. Elizabeth</text>
                <text x="185" y="245" font-size="10" fill="#eaf9e0">Manchester</text>
                <text x="290" y="175" font-size="10" fill="#eaf9e0">St. Ann</text>
                <text x="185" y="105" font-size="10" fill="#eaf9e0">Trelawny</text>
                <text x="125" y="80" font-size="10" fill="#eaf9e0">St. James</text>
                <text x="370" y="135" font-size="10" fill="#eaf9e0">St. Mary</text>
                <text x="455" y="135" font-size="10" fill="#eaf9e0">Portland</text>
                <text x="495" y="225" font-size="10" fill="#eaf9e0">St. Thomas</text>
                <text x="390" y="210" font-size="10" fill="#eaf9e0">St. Andrew</text>
                <text x="425" y="230" font-size="10" fill="#eaf9e0">Kingston</text>
                <text x="255" y="235" font-size="10" fill="#eaf9e0">Clarendon</text>
                <text x="330" y="225" font-size="10" fill="#eaf9e0">St. Catherine</text>
            </svg>
        </div>

        <!-- side panel: dynamic parish name + recycling list -->
        <div class="info-side">
            <div class="side-header">recycling points</div>
            <div id="current-parish-name">⏺ hover over a parish</div>
            <div id="recycling-list-container" class="recycling-list">
                <!-- filled by javascript -->
                <div class="empty-message">♻️ hover to see locations</div>
            </div>
            <div class="footer-note">📍 3–5 recycling centres per parish</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- recycling data for each Jamaican parish (fictional but representative) ----------
        const recyclingDB = {
            "Hanover": [
                "Lucea Recycling Depot – Main St", "Hopewell Bottle Buyback", "Green Island Eco Centre", "Hanover Recycle Ltd (Brown's Town)"
            ],
            "Westmoreland": [
                "Savanna-la-Mar Public Recycling", "Negril Glass & Plastic Drop-off", "Bluefields Recycling Station", "Frome Community Centre"
            ],
            "St. Elizabeth": [
                "Santa Cruz Recyclers", "Black River Environmental Hub", "Junction Buy-Back Centre", "Bull Savannah Collection Point", "South Coast Recycling (Treasure Beach)"
            ],
            "Manchester": [
                "Mandeville Recycling Centre (Grove Rd)", "Christianna Metal & Plastic", "Porus Recycle Depot", "Williamsfield Paper & Cardboard", "Alligator Pond Community Bin"
            ],
            "St. Ann": [
                "St. Ann's Bay Recycling Inc", "Ocho Rios Eco Station", "Brown's Town Buy-Back", "Cave Valley Collection", "Runaway Bay Glass Only"
            ],
            "Trelawny": [
                "Falmouth Recycle Centre (Water Square)", "Duncans Recycling Depot", "Wait-a-Bit Community", "Clark's Town Plastic & Alu", "Rio Bueno Return Centre"
            ],
            "St. James": [
                "Montego Bay Recycling (Freeport)", "Rose Hall Bottle Buyback", "Irwin Collection Point", "Anchovy Drop-off", "Cambridge Recycling Hub"
            ],
            "St. Mary": [
                "Port Maria Recycling Centre", "Highgate Eco Drop", "Annotto Bay Buy-Back", "Richmond Paper & Plastic", "Robin's Bay Community Bin"
            ],
            "Portland": [
                "Port Antonio Recycling Depot", "Buff Bay Valley Collection", "Hope Bay Recycling", "Manchioneal Buy-Back", "Long Bay Eco Station"
            ],
            "St. Thomas": [
                "Morant Bay Recycling Centre (Main St)", "Yallahs Collection Hub", "Seaforth Community Drop-off", "Golden Grove Recycling", "Lyssons Plastic Buy-Back"
            ],
            "St. Andrew": [
                "Half-Way-Tree Recycling Depot (S&D)", "Liguanea Paper & Can Return", "Constant Spring Drop-off", "Mavis Bank Eco Station", "August Town Bottle Buyback"
            ],
            "Kingston": [
                "Kingston Harbour Recycling (Port Royal St)", "Cross Roads Glass & Alu", "Barbican Community Bin", "Downtown Kingston Return Centre (Tower St)"
            ],
            "Clarendon": [
                "May Pen Recycling Centre (Chapelton Rd)", "Lionel Town Buy-Back", "Frankfield Eco Drop", "Race Course Plastic & Can", "Mocho Collection Point"
            ],
            "St. Catherine": [
                "Spanish Town Recycling (Burke Rd)", "Portmore Pines Drop-off", "Old Harbour Recycling Depot", "Linstead Market Return Centre", "Ewarton Community Collection"
            ]
        };

        // get all parish polygons
        const parishes = document.querySelectorAll('.parish');
        const currentParishSpan = document.getElementById('current-parish-name');
        const containerDiv = document.getElementById('recycling-list-container');

        // helper: render list for a parish name (or null)
        function renderRecycling(parishName) {
            if (!parishName) {
                containerDiv.innerHTML = `<div class="empty-message">♻️ hover over a parish</div>`;
                return;
            }

            const locations = recyclingDB[parishName];
            if (!locations || locations.length === 0) {
                // fallback (should never happen if data complete)
                containerDiv.innerHTML = `<div class="empty-message">✨ no recycling info (yet)</div>`;
                return;
            }

            // build an unordered list with icons
            let html = `<ul>`;
            locations.forEach((loc, idx) => {
                // add a small variation
                let icon = (idx % 3 === 0) ? '🥫' : (idx % 3 === 1) ? '📦' : '🍾';
                html += `<li>${icon} ${loc} <span>♻️</span></li>`;
            });
            html += `</ul>`;
            containerDiv.innerHTML = html;
        }

        // hover listeners for each parish
        parishes.forEach(p => {
            p.addEventListener('mouseenter', (e) => {
                const parishName = e.target.getAttribute('data-name');
                if (parishName) {
                    currentParishSpan.textContent = parishName;
                    renderRecycling(parishName);
                } else {
                    // fallback: try to parse from id (unlikely)
                    currentParishSpan.textContent = "unknown parish";
                }
            });

            // optional: slight style on hover is already in css, but we keep it.
        });

        // optional: reset when mouse leaves the whole svg area, but we prefer leaving last result
        // better: reset if mouse leaves map container (not parish) – but keep last hover for convenience
        const svgBox = document.querySelector('.svg-container');
        svgBox.addEventListener('mouseleave', () => {
            // we set back to neutral message, but keep last parish name? let's set a nice default
            currentParishSpan.textContent = '⏺ hover over a parish';
            containerDiv.innerHTML = `<div class="empty-message">♻️ hover to see locations</div>`;
        });

        // On page load, maybe show default message (already there) or one parish?
        // we can preload st.andrew as example?
        // but empty message is fine.
        // ensure initial render is empty (already in HTML)
        // but for consistency, call with null
        renderRecycling(null);
        currentParishSpan.textContent = '⏺ hover over a parish';
    })();
</script>

<!-- subtle extra style for better interactivity feedback -->
<style>
    .parish {
        transition: fill 0.2s, stroke 0.2s;
        fill: #3a8b4d;  /* base green, still visible */
    }
    .parish:hover {
        fill: #5fb06f;  /* lighter green on hover */
    }
    .recycling-list li:hover {
        background: #fff5cf;
        border-left-color: #b8860b;
        transform: scale(1.01);
    }
</style>
</body>
</html>
